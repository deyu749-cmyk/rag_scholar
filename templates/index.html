<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学术 RAG 系统 v2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>学术 RAG 系统 v2.0</h1>
            <div class="subtitle">Academic Research Assistant — 文献检索 · 研究分析 · 学术写作</div>
        </div>

        <!-- Tab 切换 -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="search">文献检索</button>
            <button class="tab-btn" data-tab="writing">写作模式</button>
            <button class="tab-btn" data-tab="index">索引管理</button>
        </div>

        <!-- ===== 文献检索 Tab ===== -->
        <div class="tab-content active" id="tab-search">
            <!-- 文献库选择 -->
            <div class="panel">
                <h3>选择文献库</h3>
                <div class="lib-checkboxes" id="lib-checkboxes-search"></div>
            </div>

            <!-- 搜索区域 -->
            <div class="panel">
                <div class="search-wrapper">
                    <textarea id="search-input" rows="3" placeholder="输入研究问题，例如：索因卡戏剧中人物的政治意识研究有哪些重要成果？哪些方向研究不足？"></textarea>
                    <div class="search-btns">
                        <button class="btn btn-primary" id="btn-search" onclick="doSearch()">检索分析</button>
                        <button class="btn btn-secondary" id="btn-summarize" onclick="doSummarize()">总结</button>
                        <button class="btn btn-secondary" id="btn-recheck" onclick="doRecheck()">审查</button>
                    </div>
                </div>
            </div>

            <!-- 加载动画 -->
            <div class="loading" id="search-loading">
                <div class="spinner"></div>
                <div class="loading-text">正在检索与分析中，请稍候...</div>
            </div>

            <!-- 结果区域 -->
            <div class="results-panel" id="results-panel">
                <div class="results-header">
                    <h3>分析结果</h3>
                    <span class="mode-badge" id="mode-badge"></span>
                </div>
                <div class="analysis-content" id="analysis-content"></div>
                <div class="toolbar">
                    <button class="btn btn-secondary" onclick="copyAnalysis()">复制结果</button>
                    <button class="btn btn-secondary" onclick="clearResults()">清空</button>
                </div>
            </div>

            <!-- 历史记录 -->
            <div class="history-panel">
                <h3>历史记录</h3>
                <div id="history-list"></div>
            </div>
        </div>

        <!-- ===== 写作模式 Tab ===== -->
        <div class="tab-content" id="tab-writing">
            <!-- 文献库选择 -->
            <div class="panel">
                <h3>关联文献库（提供论证方向参考）</h3>
                <div class="lib-checkboxes" id="lib-checkboxes-writing"></div>
            </div>

            <!-- 写作子模式切换 -->
            <div class="writing-mode-tabs">
                <button class="writing-mode-btn active" data-wmode="rewrite" onclick="switchWritingMode('rewrite', this)">润色改写</button>
                <button class="writing-mode-btn" data-wmode="review" onclick="switchWritingMode('review', this)">文献综述</button>
                <button class="writing-mode-btn" data-wmode="annotate" onclick="switchWritingMode('annotate', this)">引用标注</button>
            </div>

            <!-- ===== 子模式1：润色改写（原有）===== -->
            <div class="writing-mode-content active" id="wmode-rewrite">
                <!-- 写作风格选择 -->
                <div class="writing-toolbar">
                    <button class="style-btn active" data-style="polish" onclick="setWritingStyle('polish', this)">润色</button>
                    <button class="style-btn" data-style="rewrite" onclick="setWritingStyle('rewrite', this)">改写</button>
                    <button class="style-btn" data-style="expand" onclick="setWritingStyle('expand', this)">扩写</button>
                    <button class="style-btn" data-style="condense" onclick="setWritingStyle('condense', this)">压缩</button>
                </div>

                <!-- 写作区域：左输入 右输出 -->
                <div class="writing-area">
                    <div class="writing-col">
                        <label>输入原文</label>
                        <textarea class="writing-textarea" id="writing-input" placeholder="在此粘贴需要润色或改写的学术文本..."></textarea>
                        <div style="margin-top:12px; text-align:right;">
                            <button class="btn btn-primary" id="btn-write" onclick="doWrite()">开始处理</button>
                        </div>
                    </div>
                    <div class="writing-col">
                        <label>输出结果</label>
                        <div class="writing-output" id="writing-output">处理结果将显示在这里...</div>
                        <div class="writing-chat-bar">
                            <input type="text" id="writing-chat-input" placeholder="输入修改指令，例如：第二段再学术化一些" onkeydown="if(event.key==='Enter')doWritingChat()">
                            <button class="btn btn-secondary" onclick="doWritingChat()">修改</button>
                            <button class="btn btn-secondary" onclick="copyWritingOutput()">复制</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ===== 子模式2：文献综述 ===== -->
            <div class="writing-mode-content" id="wmode-review">
                <div class="writing-toolbar">
                    <button class="style-btn active" data-scope="review" onclick="setReviewScope('review', this)">文献综述</button>
                    <button class="style-btn" data-scope="overview" onclick="setReviewScope('overview', this)">概论</button>
                </div>

                <div class="writing-area">
                    <div class="writing-col">
                        <label>研究主题</label>
                        <textarea class="writing-textarea" id="review-topic-input" placeholder="输入研究主题或问题，例如：后殖民视角下尼日利亚小说的叙事策略研究"></textarea>
                        <div style="margin-top:12px; text-align:right;">
                            <button class="btn btn-primary" id="btn-review" onclick="doReview()">生成综述</button>
                        </div>
                    </div>
                    <div class="writing-col">
                        <label>生成结果</label>
                        <div class="writing-output" id="review-output">综述结果将显示在这里...</div>
                        <div class="writing-chat-bar">
                            <button class="btn btn-secondary" onclick="copyReviewOutput()">复制</button>
                        </div>
                        <div class="ref-list" id="review-refs"></div>
                    </div>
                </div>
            </div>

            <!-- ===== 子模式3：引用标注 ===== -->
            <div class="writing-mode-content" id="wmode-annotate">
                <div class="writing-area">
                    <div class="writing-col">
                        <label>粘贴已写完的文章</label>
                        <textarea class="writing-textarea" id="annotate-input" placeholder="将已完成的文章粘贴到此处，系统将从文献库中匹配可引用的段落并标注..."></textarea>
                        <div style="margin-top:12px; text-align:right;">
                            <button class="btn btn-primary" id="btn-annotate" onclick="doAnnotate()">开始标注</button>
                        </div>
                    </div>
                    <div class="writing-col">
                        <label>引用标注结果</label>
                        <div class="writing-output" id="annotate-output">标注结果将显示在这里...</div>
                        <div class="writing-chat-bar">
                            <button class="btn btn-secondary" onclick="copyAnnotateOutput()">复制</button>
                        </div>
                        <div class="ref-list" id="annotate-refs"></div>
                    </div>
                </div>
            </div>

            <!-- 写作加载 -->
            <div class="loading" id="writing-loading">
                <div class="spinner"></div>
                <div class="loading-text">正在处理中...</div>
            </div>
        </div>

        <!-- ===== 索引管理 Tab ===== -->
        <div class="tab-content" id="tab-index">
            <div class="panel">
                <h3>索引管理</h3>

                <!-- 库选择 -->
                <div class="lib-checkboxes" id="lib-checkboxes-index" style="margin-bottom:16px;"></div>

                <!-- 选项 -->
                <div class="index-options">
                    <label>
                        <input type="checkbox" id="opt-force-rebuild">
                        强制重建（删除旧索引）
                    </label>
                    <label>
                        <input type="checkbox" id="opt-gen-summaries" checked>
                        生成 AI 摘要
                    </label>
                </div>

                <!-- 操作按钮 -->
                <div style="display:flex; gap:10px; margin-bottom:16px;">
                    <button class="btn btn-primary" id="btn-start-index" onclick="startIndexing()">开始索引</button>
                    <button class="btn btn-danger" id="btn-delete-index" onclick="deleteSelectedIndex()">删除索引</button>
                </div>

                <!-- 进度面板 -->
                <div class="progress-panel" id="progress-panel">
                    <div class="progress-bar-wrapper">
                        <div class="progress-bar" id="progress-bar"></div>
                    </div>
                    <div id="progress-log"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
